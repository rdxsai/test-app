<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guided Learning — Socratic Tutor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    body { background-color: #f8f9fa; }

    .sticky-header {
      position: sticky; top: 0; z-index: 1000;
      background-color: white; border-bottom: 1px solid #dee2e6;
      padding: 1rem 0; margin-bottom: 0;
    }

    /* Stage bar */
    .stage-bar {
      background: linear-gradient(135deg, #0d6efd11, #6610f211);
      border-bottom: 1px solid #dee2e6;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }
    .stage-bar .stage-name { font-weight: 600; color: #0d6efd; text-transform: uppercase; }
    .stage-bar .objective-name { color: #495057; }

    /* Assessment score display */
    .assessment-bar {
      background-color: #fff3cd; border-bottom: 1px solid #ffc107;
      padding: 0.4rem 1rem; font-size: 0.82rem; display: none;
    }
    .assessment-bar .score { font-weight: 700; font-size: 1rem; }

    /* Chat */
    .chat-container {
      height: calc(100vh - 210px);
      display: flex; flex-direction: column;
      background-color: #ffffff; border: 1px solid #dee2e6; border-radius: 0 0 8px 8px;
    }
    .chat-messages { flex-grow: 1; overflow-y: auto; padding: 1rem; }
    .chat-input-area { border-top: 1px solid #dee2e6; padding: 0.75rem; background-color: #f8f9fa; }
    .chat-input-area textarea { resize: none; max-height: 10rem; }

    /* Message bubbles */
    .message-bubble { display: flex; align-items: flex-start; margin-bottom: 1.25rem; max-width: 85%; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }
    .avatar-tutor { background-color: #0d6efd; }
    .avatar-user { background-color: #6c757d; }
    .message-content { padding: 0.75rem 1rem; border-radius: 12px; position: relative; }
    .message-bubble.tutor { margin-right: auto; }
    .message-bubble.tutor .message-content { background-color: #e9ecef; color: #212529; margin-left: 0.75rem; border-bottom-left-radius: 0; }
    .message-bubble.user { margin-left: auto; flex-direction: row-reverse; }
    .message-bubble.user .message-content { background-color: #0d6efd; color: white; margin-right: 0.75rem; border-bottom-right-radius: 0; }
    .message-timestamp { font-size: 0.75rem; color: #6c757d; margin-top: 0.25rem; }
    .message-bubble.user .message-timestamp { text-align: right; }

    /* Typing indicator */
    .typing-indicator { display: none; align-items: flex-start; }
    .typing-content { display: flex; align-items: center; gap: 0.5rem; }
    .typing-dots { display: inline-block; }
    .typing-dots span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: #6c757d; margin: 0 2px; animation: typing 1.4s infinite ease-in-out; }
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing { 0%,80%,100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    .stage-label { font-size: 0.8rem; color: #6c757d; font-style: italic; }
    .ws-status { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 4px; }
    .ws-status.connected { color: #198754; }
    .ws-status.disconnected { color: #dc3545; }

    /* Right panel — learning progress */
    .progress-panel { height: calc(100vh - 210px); border: 1px solid #dee2e6; border-radius: 8px; background-color: #ffffff; }
    .progress-header { padding: 1rem; border-bottom: 1px solid #dee2e6; }
    .progress-content { height: calc(100% - 60px); overflow-y: auto; padding: 1rem; }

    /* Mastery cards */
    .mastery-card { padding: 0.5rem 0.75rem; border: 1px solid #e9ecef; border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.82rem; }
    .mastery-card .objective-text { font-weight: 500; }
    .mastery-level { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
    .mastery-level.mastered { background-color: #d1e7dd; color: #0f5132; }
    .mastery-level.partial { background-color: #fff3cd; color: #664d03; }
    .mastery-level.in_progress { background-color: #cff4fc; color: #055160; }
    .mastery-level.misconception { background-color: #f8d7da; color: #842029; }
    .mastery-level.not_attempted { background-color: #e9ecef; color: #6c757d; }

    /* Markdown in messages */
    .message-content p { margin-bottom: 0.5rem; }
    .message-content p:last-child { margin-bottom: 0; }
    .message-content ul, .message-content ol { padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .message-content code { background-color: rgba(0,0,0,0.06); padding: 0.15rem 0.35rem; border-radius: 3px; font-size: 0.88em; }
    .message-bubble.user .message-content code { background-color: rgba(255,255,255,0.2); }
    .message-content pre { background-color: #1e1e1e; color: #d4d4d4; padding: 0.75rem 1rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; font-size: 0.85rem; line-height: 1.5; }
    .message-content pre code { background: none; padding: 0; border-radius: 0; font-size: inherit; color: inherit; }
    .message-content blockquote { border-left: 3px solid #0d6efd; margin: 0.5rem 0; padding: 0.25rem 0.75rem; color: #495057; background-color: rgba(13,110,253,0.04); border-radius: 0 4px 4px 0; }
    .message-content table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.85rem; }
    .message-content th, .message-content td { border: 1px solid #dee2e6; padding: 0.4rem 0.6rem; text-align: left; }
    .message-content th { background-color: rgba(0,0,0,0.04); font-weight: 600; }

    /* Onboarding form cards */
    .onboarding-card {
      background: #fff; border: 1px solid #dee2e6; border-radius: 12px;
      padding: 1.25rem; margin-bottom: 1rem; max-width: 85%;
    }
    .onboarding-card .question-text { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }
    .onboarding-card .question-desc { font-size: 0.82rem; color: #6c757d; margin-bottom: 0.75rem; }
    .onboarding-card .step-badge { font-size: 0.7rem; color: #6c757d; margin-bottom: 0.5rem; }
    .onboarding-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .onboarding-option {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 1rem; border: 2px solid #e9ecef; border-radius: 8px;
      cursor: pointer; transition: all 0.15s; background: #fff;
    }
    .onboarding-option:hover { border-color: #0d6efd; background: #f0f6ff; }
    .onboarding-option.selected { border-color: #0d6efd; background: #e7f1ff; }
    .onboarding-option .opt-label { font-weight: 500; font-size: 0.9rem; }
    .onboarding-option .opt-desc { font-size: 0.78rem; color: #6c757d; }
    .onboarding-other {
      display: none; margin-top: 0.5rem;
    }
    .onboarding-other.visible { display: flex; gap: 0.5rem; }
    .onboarding-other input { flex: 1; }
    .onboarding-submit {
      margin-top: 0.75rem; width: 100%;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="sticky-header">
    <div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">
          <i class="fas fa-graduation-cap text-primary"></i> Guided Learning
        </h1>
        <div class="d-flex align-items-center gap-2">
          <span id="wsStatus" class="ws-status disconnected">Connecting...</span>
          <a href="/chat" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-comments"></i> Q&A Mode
          </a>
          <a href="/" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left"></i> Home
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Stage bar -->
  <div class="stage-bar" id="stageBar">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <div>
        <span class="stage-name" id="currentStageDisplay">Connecting...</span>
        <span class="objective-name ms-2" id="currentObjectiveDisplay"></span>
      </div>
      <div id="assessmentInfo" style="display:none;">
        <span class="badge bg-warning text-dark" id="assessmentBadge"></span>
      </div>
    </div>
  </div>

  <!-- Assessment score bar (shown during assessments) -->
  <div class="assessment-bar" id="assessmentBar">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <span>Assessment in progress</span>
      <span>Score: <span class="score" id="assessmentScore">0/0</span></span>
    </div>
  </div>

  <div class="container-fluid mt-2">
    <div class="row">
      <!-- Chat Panel (Left) -->
      <div class="col-lg-8 mb-3 mb-lg-0">
        <div class="chat-container">
          <div class="chat-messages" id="chatMessages">
            <div class="message-bubble tutor typing-indicator" id="typingIndicator">
              <div class="avatar avatar-tutor"><i class="fas fa-robot"></i></div>
              <div class="message-content">
                <div class="typing-content">
                  <div class="typing-dots"><span></span><span></span><span></span></div>
                  <span class="stage-label" id="stageLabel"></span>
                </div>
              </div>
            </div>
          </div>
          <div class="chat-input-area">
            <div class="d-flex">
              <textarea id="messageInput" class="form-control me-2" placeholder="Type your response..." rows="1"></textarea>
              <button id="sendBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Learning Progress Panel (Right) -->
      <div class="col-lg-4">
        <div class="progress-panel">
          <div class="progress-header">
            <h6 class="mb-0"><i class="fas fa-chart-line"></i> Learning Progress</h6>
          </div>
          <div class="progress-content" id="progressContent">
            <div id="masteryList">
              <p class="text-muted" style="font-size:0.82rem;">Your mastery progress will appear here as you learn.</p>
            </div>
            <div id="misconceptionsList" style="display:none;" class="mt-3">
              <h6 class="mb-2" style="font-size:0.85rem;"><i class="fas fa-exclamation-triangle text-warning"></i> Active Misconceptions</h6>
              <div id="misconceptionsContainer"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatMessages = document.getElementById("chatMessages");
      const typingIndicator = document.getElementById("typingIndicator");
      const stageLabel = document.getElementById("stageLabel");
      const wsStatus = document.getElementById("wsStatus");
      const currentStageDisplay = document.getElementById("currentStageDisplay");
      const currentObjectiveDisplay = document.getElementById("currentObjectiveDisplay");
      const assessmentBar = document.getElementById("assessmentBar");
      const assessmentScore = document.getElementById("assessmentScore");
      const assessmentBadge = document.getElementById("assessmentBadge");
      const assessmentInfo = document.getElementById("assessmentInfo");
      const masteryList = document.getElementById("masteryList");
      const misconceptionsList = document.getElementById("misconceptionsList");
      const misconceptionsContainer = document.getElementById("misconceptionsContainer");

      let isProcessing = false;
      let studentId = "guided-student-" + Math.random().toString(36).substring(2, 8);
      let ws = null;
      let pingInterval = null;
      let streamingBubble = null;
      let streamingTextEl = null;
      let currentStage = "connecting";
      let masteryData = {};

      const STAGE_LABELS = {
        loading: "Loading your profile...",
        searching: "Searching knowledge base...",
        composing: "Composing response...",
        classifying: "Understanding your response...",
      };

      const STAGE_DISPLAY = {
        onboarding: "Onboarding",
        introduction: "Introduction",
        exploration: "Exploration",
        readiness_check: "Readiness Check",
        mini_assessment: "Mini Assessment",
        final_assessment: "Final Assessment",
        transition: "Transition",
      };

      // ================================================================
      // WEBSOCKET
      // ================================================================

      function connectWebSocket() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const url = `${protocol}//${window.location.host}/chat/guided/ws`;
        ws = new WebSocket(url);

        ws.onopen = function () {
          wsStatus.textContent = "Connected";
          wsStatus.className = "ws-status connected";
          ws.send(JSON.stringify({ type: "auth", student_id: studentId }));

          if (pingInterval) clearInterval(pingInterval);
          pingInterval = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
          }, 30000);
        };

        ws.onmessage = function (event) {
          handleServerMessage(JSON.parse(event.data));
        };

        ws.onclose = function (event) {
          wsStatus.textContent = "Disconnected";
          wsStatus.className = "ws-status disconnected";
          if (pingInterval) clearInterval(pingInterval);
          if (event.code !== 1000) setTimeout(connectWebSocket, 3000);
        };

        ws.onerror = function (error) { console.error("WS error:", error); };
      }

      function handleServerMessage(msg) {
        switch (msg.type) {
          case "connected":
            break;

          case "authenticated":
            studentId = msg.student_id;
            currentStage = msg.stage || "onboarding";
            updateStageDisplay(currentStage, msg.objective || "");
            if (msg.has_profile) {
              setProcessingState(false);
            }
            break;

          case "welcome":
            addMessage("tutor", msg.content);
            updateStageDisplay(msg.stage || "onboarding", "");
            setProcessingState(false);
            break;

          case "stage":
            stageLabel.textContent = msg.detail || STAGE_LABELS[msg.stage] || msg.stage;
            setProcessingState(true);
            break;

          case "rag_chunks":
            // Instance B doesn't show RAG chunks in sidebar — they're cached for teaching
            break;

          case "stream_start":
            typingIndicator.style.display = "none";
            stageLabel.textContent = "";
            createStreamingBubble();
            break;

          case "token":
            appendToken(msg.content);
            break;

          case "stream_end":
            finalizeStreamingBubble();
            setProcessingState(false);
            break;

          // --- Instance B specific ---

          case "stage_update":
            currentStage = msg.stage;
            updateStageDisplay(msg.stage, msg.objective || "");
            if (msg.summary) {
              addMessage("system", `Stage: ${STAGE_DISPLAY[msg.stage] || msg.stage}` +
                (msg.summary ? ` — ${msg.summary}` : ""));
            }
            break;

          case "mastery_update":
            updateMasteryCard(msg.objective_text || msg.objective_id, msg.new_level);
            break;

          case "assessment_score":
            updateAssessmentDisplay(msg);
            break;

          case "onboarding_question":
            renderOnboardingQuestion(msg);
            break;

          case "onboarding_complete":
            updateStageDisplay("introduction", msg.first_objective || "");
            addSystemNotice(`Profile created! Starting: ${msg.first_objective}`);
            setProcessingState(false);
            break;

          case "objective_complete":
            updateMasteryCard(msg.objective_id, msg.mastery_level);
            if (msg.next_objective) {
              addSystemNotice(`Objective complete! Next: ${msg.next_objective}`);
            }
            break;

          case "error":
            setProcessingState(false);
            addMessage("system", "Error: " + msg.message);
            break;

          case "pong":
            break;

          default:
            console.log("WS: unknown message type", msg.type, msg);
        }
      }

      // ================================================================
      // STAGE & MASTERY UI
      // ================================================================

      function updateStageDisplay(stage, objective) {
        currentStageDisplay.textContent = STAGE_DISPLAY[stage] || stage;
        currentObjectiveDisplay.textContent = objective ? `— ${objective}` : "";

        // Show/hide assessment bar
        if (stage === "mini_assessment" || stage === "final_assessment") {
          assessmentBar.style.display = "block";
          assessmentInfo.style.display = "inline";
          assessmentBadge.textContent = stage === "mini_assessment" ? "Mini (3 Qs)" : "Final (5 Qs)";
        } else {
          assessmentBar.style.display = "none";
          assessmentInfo.style.display = "none";
        }
      }

      function updateAssessmentDisplay(data) {
        assessmentScore.textContent = `${data.correct}/${data.asked}`;
        if (data.passed === true) {
          assessmentBar.style.backgroundColor = "#d1e7dd";
          assessmentBar.style.borderColor = "#198754";
        } else if (data.passed === false) {
          assessmentBar.style.backgroundColor = "#f8d7da";
          assessmentBar.style.borderColor = "#dc3545";
        }
      }

      function updateMasteryCard(objectiveId, level) {
        masteryData[objectiveId] = level;
        renderMasteryList();
      }

      function renderMasteryList() {
        const ids = Object.keys(masteryData);
        if (!ids.length) return;

        masteryList.innerHTML = "";
        ids.forEach(id => {
          const level = masteryData[id];
          const card = document.createElement("div");
          card.className = "mastery-card";
          card.innerHTML = `
            <div class="d-flex justify-content-between align-items-center">
              <span class="objective-text">${id}</span>
              <span class="mastery-level ${level}">${level.replace("_", " ")}</span>
            </div>`;
          masteryList.appendChild(card);
        });
      }

      function addSystemNotice(text) {
        const el = document.createElement("div");
        el.className = "text-center my-2";
        el.innerHTML = `<small class="text-muted"><i class="fas fa-info-circle"></i> ${text}</small>`;
        chatMessages.insertBefore(el, typingIndicator);
        scrollToBottomIfNeeded();
      }

      // ================================================================
      // STREAMING
      // ================================================================

      function isNearBottom() {
        return chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 100;
      }
      function scrollToBottomIfNeeded() {
        if (isNearBottom()) chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function createStreamingBubble() {
        const bubble = document.createElement("div");
        bubble.className = "message-bubble tutor";
        const avatar = document.createElement("div");
        avatar.className = "avatar avatar-tutor";
        avatar.innerHTML = '<i class="fas fa-robot"></i>';
        const content = document.createElement("div");
        content.className = "message-content";
        const textEl = document.createElement("div");
        textEl.className = "streaming-text";
        content.appendChild(textEl);
        bubble.appendChild(avatar);
        bubble.appendChild(content);
        chatMessages.insertBefore(bubble, typingIndicator);
        streamingBubble = bubble;
        streamingTextEl = textEl;
        scrollToBottomIfNeeded();
      }

      let _markdownTimer = null;
      function appendToken(token) {
        if (!streamingTextEl) return;
        streamingTextEl._rawText = (streamingTextEl._rawText || "") + token;
        if (!_markdownTimer) {
          _markdownTimer = setTimeout(() => {
            _markdownTimer = null;
            if (streamingTextEl) {
              streamingTextEl.innerHTML = formatMessage(streamingTextEl._rawText);
              scrollToBottomIfNeeded();
            }
          }, 120);
        }
      }

      function finalizeStreamingBubble() {
        if (_markdownTimer) { clearTimeout(_markdownTimer); _markdownTimer = null; }
        if (streamingBubble && streamingTextEl) {
          // Strip any ```json eval block from displayed text
          let text = streamingTextEl._rawText || "";
          text = text.replace(/```json[\s\S]*?```/g, "").trim();
          streamingTextEl.innerHTML = formatMessage(text);
          const ts = document.createElement("div");
          ts.className = "message-timestamp";
          ts.textContent = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
          streamingTextEl.parentElement.appendChild(ts);
        }
        streamingBubble = null;
        streamingTextEl = null;
      }

      // ================================================================
      // USER ACTIONS
      // ================================================================

      sendBtn.addEventListener("click", () => {
        const message = messageInput.value.trim();
        if (message && !isProcessing) {
          addMessage("user", message);
          setProcessingState(true);
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "message", content: message }));
          }
          messageInput.value = "";
          autoResizeTextarea(messageInput);
        }
      });

      messageInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
      });
      messageInput.addEventListener("input", () => autoResizeTextarea(messageInput));

      // ================================================================
      // UI HELPERS
      // ================================================================

      function addMessage(type, content) {
        const bubble = document.createElement("div");
        bubble.className = `message-bubble ${type}`;
        const avatar = document.createElement("div");
        avatar.className = `avatar avatar-${type}`;
        avatar.innerHTML = `<i class="fas ${type === "user" ? "fa-user" : "fa-robot"}"></i>`;
        const mc = document.createElement("div");
        mc.className = "message-content";
        const text = document.createElement("div");
        text.innerHTML = formatMessage(content);
        const ts = document.createElement("div");
        ts.className = "message-timestamp";
        ts.textContent = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
        mc.appendChild(text);
        mc.appendChild(ts);
        bubble.appendChild(avatar);
        bubble.appendChild(mc);
        chatMessages.insertBefore(bubble, typingIndicator);
        scrollToBottomIfNeeded();
      }

      function setProcessingState(processing) {
        isProcessing = processing;
        sendBtn.disabled = processing;
        messageInput.disabled = processing;
        typingIndicator.style.display = processing ? "flex" : "none";
        if (processing) {
          sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
          scrollToBottomIfNeeded();
        } else {
          sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
          stageLabel.textContent = "";
          messageInput.focus();
        }
      }

      function autoResizeTextarea(textarea) {
        textarea.style.height = "auto";
        textarea.style.height = `${Math.min(textarea.scrollHeight, 160)}px`;
      }

      marked.setOptions({
        highlight: function(code, lang) {
          if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
          return hljs.highlightAuto(code).value;
        },
        breaks: true, gfm: true,
      });

      function formatMessage(content) {
        if (typeof content !== "string") return "";
        return marked.parse(content);
      }

      // ================================================================
      // ONBOARDING FORM
      // ================================================================

      function renderOnboardingQuestion(msg) {
        setProcessingState(false);

        const card = document.createElement("div");
        card.className = "onboarding-card";

        // Step indicator
        const step = document.createElement("div");
        step.className = "step-badge";
        step.textContent = `Step ${msg.step} of ${msg.total_steps}`;
        card.appendChild(step);

        // Question
        const q = document.createElement("div");
        q.className = "question-text";
        q.textContent = msg.question;
        card.appendChild(q);

        if (msg.description) {
          const desc = document.createElement("div");
          desc.className = "question-desc";
          desc.textContent = msg.description;
          card.appendChild(desc);
        }

        // Options
        const optionsDiv = document.createElement("div");
        optionsDiv.className = "onboarding-options";
        let selectedValue = null;

        (msg.options || []).forEach(opt => {
          const optEl = document.createElement("div");
          optEl.className = "onboarding-option";
          optEl.dataset.value = opt.value;

          let html = `<div><div class="opt-label">${opt.label}</div>`;
          if (opt.description) html += `<div class="opt-desc">${opt.description}</div>`;
          html += `</div>`;
          optEl.innerHTML = html;

          optEl.addEventListener("click", () => {
            optionsDiv.querySelectorAll(".onboarding-option").forEach(o => o.classList.remove("selected"));
            optEl.classList.add("selected");
            selectedValue = opt.value;
            otherDiv.classList.remove("visible");
            otherInput.value = "";
            submitBtn.disabled = false;
          });
          optionsDiv.appendChild(optEl);
        });
        card.appendChild(optionsDiv);

        // "Other" option
        const otherDiv = document.createElement("div");
        otherDiv.className = "onboarding-other";
        const otherInput = document.createElement("input");
        otherInput.type = "text";
        otherInput.className = "form-control form-control-sm";
        otherInput.placeholder = "Type your answer...";
        otherInput.addEventListener("input", () => {
          if (otherInput.value.trim()) {
            selectedValue = otherInput.value.trim();
            submitBtn.disabled = false;
          }
        });
        otherDiv.appendChild(otherInput);
        card.appendChild(otherDiv);

        if (msg.allow_other) {
          const otherBtn = document.createElement("div");
          otherBtn.className = "onboarding-option";
          otherBtn.innerHTML = `<div><div class="opt-label">Other</div><div class="opt-desc">Type your own answer</div></div>`;
          otherBtn.addEventListener("click", () => {
            optionsDiv.querySelectorAll(".onboarding-option").forEach(o => o.classList.remove("selected"));
            otherBtn.classList.add("selected");
            selectedValue = null;
            otherDiv.classList.add("visible");
            otherInput.focus();
            submitBtn.disabled = true;
          });
          optionsDiv.appendChild(otherBtn);
        }

        // Submit button
        const submitBtn = document.createElement("button");
        submitBtn.className = "btn btn-primary onboarding-submit";
        submitBtn.textContent = msg.step < msg.total_steps ? "Continue" : "Start Learning";
        submitBtn.disabled = true;
        submitBtn.addEventListener("click", () => {
          if (!selectedValue) return;
          // Show the answer as a user message
          const displayLabel = selectedValue;
          addMessage("user", displayLabel);
          // Disable the card
          card.style.opacity = "0.6";
          card.style.pointerEvents = "none";
          // Send the value
          setProcessingState(true);
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "message", content: selectedValue }));
          }
        });
        card.appendChild(submitBtn);

        chatMessages.insertBefore(card, typingIndicator);
        scrollToBottomIfNeeded();
      }

      // ================================================================
      // INIT
      // ================================================================
      setProcessingState(true);
      connectWebSocket();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guided Learning — Socratic Tutor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    body { background-color: #f8f9fa; margin: 0; overflow: hidden; }

    /* App layout — sidebar + main */
    .app-layout { display: flex; height: 100vh; }

    /* Student sidebar */
    .student-sidebar {
      width: 240px; min-width: 240px;
      background: #fff; border-right: 1px solid #dee2e6;
      display: flex; flex-direction: column;
    }
    .sidebar-header {
      padding: 0.75rem 1rem; border-bottom: 1px solid #dee2e6;
      background: #f8f9fa;
    }
    .sidebar-header h6 { margin: 0 0 0.5rem 0; font-size: 0.9rem; }
    .student-list { flex: 1; overflow-y: auto; padding: 0.4rem; }
    .student-item {
      padding: 0.55rem 0.7rem; border-radius: 8px;
      cursor: pointer; margin-bottom: 0.3rem; border: 1px solid transparent;
      transition: all 0.12s;
    }
    .student-item:hover { background: #f0f0f0; }
    .student-item.active { background: #e7f1ff; border-color: #0d6efd; }
    .student-item .student-label { font-weight: 600; font-size: 0.82rem; color: #212529; }
    .student-item .student-meta { font-size: 0.7rem; color: #6c757d; line-height: 1.3; margin-top: 0.15rem; }
    .student-item .student-level {
      display: inline-block; font-size: 0.65rem; font-weight: 600;
      padding: 0.05rem 0.4rem; border-radius: 3px; margin-top: 0.2rem;
    }
    .student-level.none { background: #e9ecef; color: #6c757d; }
    .student-level.awareness, .student-level.working_knowledge { background: #cff4fc; color: #055160; }
    .student-level.professional { background: #d1e7dd; color: #0f5132; }
    .student-actions { display: flex; flex-direction: column; gap: 0.15rem; opacity: 0; transition: opacity 0.15s; }
    .student-item:hover .student-actions { opacity: 1; }
    .btn-icon { background: none; border: none; padding: 0.15rem 0.3rem; border-radius: 4px; cursor: pointer; color: #6c757d; font-size: 0.68rem; }
    .btn-icon:hover { background: #e9ecef; color: #212529; }
    .btn-icon-danger:hover { background: #f8d7da; color: #dc3545; }
    .sidebar-footer { padding: 0.5rem; border-top: 1px solid #dee2e6; font-size: 0.7rem; color: #999; text-align: center; }
    .sidebar-nav { padding: 0.5rem 1rem; border-top: 1px solid #dee2e6; display: flex; gap: 0.3rem; }
    .sidebar-nav a { font-size: 0.75rem; }

    /* Main content area */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* Header — inline in main content */
    .main-header {
      background-color: white; border-bottom: 1px solid #dee2e6;
      padding: 0.6rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .main-header h1 { font-size: 1.2rem; margin: 0; }
    .header-actions { display: flex; align-items: center; gap: 0.5rem; }

    /* Stage bar */
    .stage-bar {
      background: linear-gradient(135deg, #0d6efd11, #6610f211);
      border-bottom: 1px solid #dee2e6;
      padding: 0.4rem 1rem; font-size: 0.82rem;
    }
    .stage-bar .stage-name { font-weight: 600; color: #0d6efd; text-transform: uppercase; }
    .stage-bar .objective-name { color: #495057; }

    .assessment-bar {
      background-color: #fff3cd; border-bottom: 1px solid #ffc107;
      padding: 0.35rem 1rem; font-size: 0.8rem; display: none;
    }
    .assessment-bar .score { font-weight: 700; font-size: 1rem; }

    /* Chat + progress grid */
    .content-grid { flex: 1; display: flex; overflow: hidden; }
    .chat-column { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .progress-column { width: 280px; min-width: 220px; max-width: 70vw; border-left: 1px solid #dee2e6; display: flex; flex-direction: column; flex-shrink: 0; }
    .progress-resizer {
      width: 6px; cursor: col-resize; background: transparent;
      border-left: 1px solid #dee2e6; flex-shrink: 0;
      transition: background 0.12s;
      position: relative;
    }
    .progress-resizer:hover, .progress-resizer.dragging { background: #0d6efd33; }
    .progress-resizer::after {
      content: ""; position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 2px; height: 36px; border-radius: 1px;
      background: #ced4da; opacity: 0.7;
    }
    .progress-resizer:hover::after { background: #0d6efd; opacity: 1; }
    body.resizing-progress { cursor: col-resize; user-select: none; }
    body.resizing-progress iframe, body.resizing-progress .chat-messages { pointer-events: none; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; }
    .chat-input-area { border-top: 1px solid #dee2e6; padding: 0.75rem; background-color: #f8f9fa; }
    .chat-input-area textarea { resize: none; max-height: 10rem; }

    /* Message bubbles */
    .message-bubble { display: flex; align-items: flex-start; margin-bottom: 1.25rem; max-width: 85%; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; font-size: 0.8rem; }
    .avatar-tutor { background-color: #0d6efd; }
    .avatar-user { background-color: #6c757d; }
    .message-content { padding: 0.6rem 0.9rem; border-radius: 12px; position: relative; }
    .message-bubble.tutor { margin-right: auto; }
    .message-bubble.tutor .message-content { background-color: #e9ecef; color: #212529; margin-left: 0.6rem; border-bottom-left-radius: 0; }
    .message-bubble.user { margin-left: auto; flex-direction: row-reverse; }
    .message-bubble.user .message-content { background-color: #0d6efd; color: white; margin-right: 0.6rem; border-bottom-right-radius: 0; }
    .message-timestamp { font-size: 0.7rem; color: #6c757d; margin-top: 0.2rem; }
    .message-bubble.user .message-timestamp { text-align: right; }

    /* Typing */
    .typing-indicator { display: none; align-items: flex-start; }
    .typing-content { display: flex; align-items: center; gap: 0.5rem; }
    .typing-dots { display: inline-block; }
    .typing-dots span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background-color: #6c757d; margin: 0 2px; animation: typing 1.4s infinite ease-in-out; }
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing { 0%,80%,100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    .stage-label { font-size: 0.78rem; color: #6c757d; font-style: italic; }
    .ws-status { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; }
    .ws-status.connected { color: #198754; }
    .ws-status.disconnected { color: #dc3545; }

    /* Progress panel */
    .progress-header { padding: 0.75rem 1rem; border-bottom: 1px solid #dee2e6; background: #f8f9fa; }
    .progress-header h6 { margin: 0; font-size: 0.85rem; }
    .progress-content { flex: 1; overflow-y: auto; padding: 0.75rem; }
    .mastery-card { padding: 0.45rem 0.65rem; border: 1px solid #e9ecef; border-radius: 6px; margin-bottom: 0.4rem; font-size: 0.78rem; }
    .mastery-card .objective-text { font-weight: 500; }
    .mastery-level { display: inline-block; padding: 0.05rem 0.4rem; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
    .mastery-level.mastered { background-color: #d1e7dd; color: #0f5132; }
    .mastery-level.partial { background-color: #fff3cd; color: #664d03; }
    .mastery-level.in_progress { background-color: #cff4fc; color: #055160; }
    .mastery-level.misconception { background-color: #f8d7da; color: #842029; }
    .mastery-level.not_attempted { background-color: #e9ecef; color: #6c757d; }

    /* Markdown */
    .message-content p { margin-bottom: 0.4rem; } .message-content p:last-child { margin-bottom: 0; }
    .message-content ul, .message-content ol { padding-left: 1.5rem; margin-bottom: 0.4rem; }
    .message-content code { background-color: rgba(0,0,0,0.06); padding: 0.12rem 0.3rem; border-radius: 3px; font-size: 0.86em; }
    .message-bubble.user .message-content code { background-color: rgba(255,255,255,0.2); }
    .message-content pre { background-color: #1e1e1e; color: #d4d4d4; padding: 0.6rem 0.8rem; border-radius: 6px; overflow-x: auto; margin: 0.4rem 0; font-size: 0.82rem; line-height: 1.5; }
    .message-content pre code { background: none; padding: 0; border-radius: 0; font-size: inherit; color: inherit; }
    .message-content blockquote { border-left: 3px solid #0d6efd; margin: 0.4rem 0; padding: 0.2rem 0.6rem; color: #495057; background-color: rgba(13,110,253,0.04); border-radius: 0 4px 4px 0; }
    .message-content table { width: 100%; border-collapse: collapse; margin: 0.4rem 0; font-size: 0.82rem; }
    .message-content th, .message-content td { border: 1px solid #dee2e6; padding: 0.35rem 0.5rem; text-align: left; }
    .message-content th { background-color: rgba(0,0,0,0.04); font-weight: 600; }

    /* Onboarding forms */
    .onboarding-card { background: #fff; border: 1px solid #dee2e6; border-radius: 12px; padding: 1.1rem; margin-bottom: 1rem; max-width: 85%; }
    .onboarding-card .question-text { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .onboarding-card .question-desc { font-size: 0.78rem; color: #6c757d; margin-bottom: 0.6rem; }
    .onboarding-card .step-badge { font-size: 0.68rem; color: #6c757d; margin-bottom: 0.4rem; }
    .onboarding-options { display: flex; flex-direction: column; gap: 0.4rem; }
    .onboarding-option { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.8rem; border: 2px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: all 0.12s; background: #fff; }
    .onboarding-option:hover { border-color: #0d6efd; background: #f0f6ff; }
    .onboarding-option.selected { border-color: #0d6efd; background: #e7f1ff; }
    .onboarding-option .opt-label { font-weight: 500; font-size: 0.85rem; }
    .onboarding-option .opt-desc { font-size: 0.74rem; color: #6c757d; }
    .onboarding-other { display: none; margin-top: 0.4rem; }
    .onboarding-other.visible { display: flex; gap: 0.4rem; }
    .onboarding-other input { flex: 1; }
    .onboarding-submit { margin-top: 0.6rem; width: 100%; }

    /* Teaching sidebar panels */
    #teachingPlanSection, #teachingContentSection, #turnAnalysisSection, #toolActivitySection { border-top: 1px solid #dee2e6; padding-top: 0.5rem; margin-top: 0.5rem; }
    .ta-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .ta-phase-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #6c757d; margin: 0.5rem 0 0.2rem; }
    .ta-phase-label:first-child { margin-top: 0; }
    .ta-card {
      border: 1px solid #e9ecef; border-radius: 6px; padding: 0.45rem 0.55rem;
      background: #fff; font-size: 0.72rem; line-height: 1.4;
    }
    .ta-card.ta-pending { border-left: 3px solid #0d6efd; background: #f0f6ff; }
    .ta-card.ta-hit { border-left: 3px solid #198754; }
    .ta-card.ta-miss { border-left: 3px solid #fd7e14; }
    .ta-card.ta-blocked, .ta-card.ta-error { border-left: 3px solid #dc3545; }
    .ta-card-header { display: flex; align-items: baseline; gap: 0.4rem; flex-wrap: wrap; }
    .ta-tool-name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-weight: 700; color: #212529; }
    .ta-meta { font-size: 0.62rem; color: #6c757d; }
    .ta-row { margin-top: 0.25rem; }
    .ta-row-label { font-weight: 600; color: #495057; margin-right: 0.25rem; }
    .ta-row-text { color: #495057; }
    .ta-result {
      margin-top: 0.3rem; font-size: 0.66rem; color: #495057;
      padding: 0.15rem 0.35rem; background: #f1f3f5; border-radius: 3px; display: inline-block;
    }
    .ta-result.ta-result-error { background: #f8d7da; color: #842029; }
    .ta-result.ta-result-blocked { background: #f8d7da; color: #842029; }
    .ta-result.ta-result-miss { background: #fff3cd; color: #664d03; }
    .ta-params summary {
      cursor: pointer; font-size: 0.65rem; color: #0d6efd; margin-top: 0.25rem;
      list-style: none; user-select: none;
    }
    .ta-params summary::-webkit-details-marker { display: none; }
    .ta-params summary::before { content: "▸ params"; }
    .ta-params[open] summary::before { content: "▾ params"; }
    .ta-params pre {
      margin: 0.25rem 0 0; padding: 0.35rem 0.45rem; background: #1e1e1e;
      color: #d4d4d4; border-radius: 3px; font-size: 0.65rem;
      max-height: 160px; overflow: auto; white-space: pre-wrap; word-break: break-word;
    }
    .tp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; cursor: pointer; user-select: none; }
    .tp-header h6 { margin: 0; font-size: 0.8rem; }
    .tp-generating { font-size: 0.73rem; color: #6c757d; font-style: italic; padding: 0.4rem 0.5rem; background: #f8f9fa; border-radius: 4px; }
    .tp-text { font-size: 0.71rem; white-space: pre-wrap; font-family: inherit; line-height: 1.5; background: #f8f9fa; border-radius: 4px; padding: 0.5rem; max-height: 360px; overflow-y: auto; }
    .tp-md { white-space: normal; }
    .tp-md > *:first-child { margin-top: 0; }
    .tp-md > *:last-child { margin-bottom: 0; }
    .tp-md p { margin: 0 0 0.4rem 0; }
    .tp-md ul, .tp-md ol { padding-left: 1.1rem; margin: 0.2rem 0 0.4rem; }
    .tp-md li { margin-bottom: 0.15rem; }
    .tp-md li > p { margin-bottom: 0.15rem; }
    .tp-md h1, .tp-md h2, .tp-md h3, .tp-md h4, .tp-md h5, .tp-md h6 {
      font-weight: 700; margin: 0.55rem 0 0.25rem; line-height: 1.25;
    }
    .tp-md h1 { font-size: 0.86rem; }
    .tp-md h2 { font-size: 0.82rem; }
    .tp-md h3 { font-size: 0.78rem; }
    .tp-md h4, .tp-md h5, .tp-md h6 { font-size: 0.74rem; }
    .tp-md code { background: rgba(0,0,0,0.06); padding: 0.05rem 0.25rem; border-radius: 3px; font-size: 0.92em; }
    .tp-md pre {
      background: #1e1e1e; color: #d4d4d4; padding: 0.45rem 0.6rem;
      border-radius: 4px; overflow-x: auto; margin: 0.3rem 0;
      font-size: 0.7rem; line-height: 1.45;
    }
    .tp-md pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
    .tp-md blockquote {
      border-left: 2px solid #0d6efd; margin: 0.3rem 0;
      padding: 0.1rem 0.5rem; color: #495057;
      background: rgba(13,110,253,0.04); border-radius: 0 4px 4px 0;
    }
    .tp-md table { width: 100%; border-collapse: collapse; margin: 0.3rem 0; font-size: 0.7rem; }
    .tp-md th, .tp-md td { border: 1px solid #dee2e6; padding: 0.25rem 0.4rem; text-align: left; }
    .tp-md th { background: rgba(0,0,0,0.04); font-weight: 600; }
    .tp-md hr { border: 0; border-top: 1px solid #dee2e6; margin: 0.5rem 0; }
    .tp-md a { color: #0d6efd; text-decoration: none; }
    .tp-md a:hover { text-decoration: underline; }
    .tp-json { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.68rem; margin: 0; background: transparent; padding: 0; color: inherit; }
    .turn-analysis-history { display: flex; flex-direction: column; gap: 0.5rem; }
    .turn-analysis-entry { border: 1px solid #e9ecef; border-radius: 6px; padding: 0.45rem; background: #fff; }
    .turn-analysis-entry-title { font-size: 0.72rem; font-weight: 600; color: #495057; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.02em; }
  </style>
</head>

<body>
  <div class="app-layout">
    <!-- ============ STUDENT SIDEBAR ============ -->
    <div class="student-sidebar">
      <div class="sidebar-header">
        <h6><i class="fas fa-users"></i> Students</h6>
        <button id="newStudentBtn" class="btn btn-primary btn-sm w-100">
          <i class="fas fa-plus"></i> New Student
        </button>
      </div>
      <div class="student-list" id="studentList"></div>
      <div class="sidebar-nav">
        <a href="/chat" class="btn btn-outline-secondary btn-sm flex-fill"><i class="fas fa-comments"></i> Q&A</a>
        <a href="/" class="btn btn-outline-secondary btn-sm flex-fill"><i class="fas fa-home"></i> Home</a>
      </div>
    </div>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="main-content">
      <!-- Header -->
      <div class="main-header">
        <h1><i class="fas fa-graduation-cap text-primary"></i> Guided Learning</h1>
        <div class="header-actions">
          <a href="/chat/tutor-prompts" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-scroll"></i> Tutor Prompts
          </a>
          <span id="wsStatus" class="ws-status disconnected">Connecting...</span>
        </div>
      </div>

      <!-- Stage bar -->
      <div class="stage-bar" id="stageBar">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <span class="stage-name" id="currentStageDisplay">Connecting...</span>
            <span class="objective-name ms-2" id="currentObjectiveDisplay"></span>
          </div>
          <div id="assessmentInfo" style="display:none;">
            <span class="badge bg-warning text-dark" id="assessmentBadge"></span>
          </div>
        </div>
      </div>

      <!-- Assessment bar -->
      <div class="assessment-bar" id="assessmentBar">
        <div class="d-flex justify-content-between align-items-center">
          <span>Assessment in progress</span>
          <span>Score: <span class="score" id="assessmentScore">0/0</span></span>
        </div>
      </div>

      <!-- Chat + Progress -->
      <div class="content-grid">
        <!-- Chat column -->
        <div class="chat-column">
          <div class="chat-messages" id="chatMessages">
            <div class="message-bubble tutor typing-indicator" id="typingIndicator">
              <div class="avatar avatar-tutor"><i class="fas fa-robot"></i></div>
              <div class="message-content">
                <div class="typing-content">
                  <div class="typing-dots"><span></span><span></span><span></span></div>
                  <span class="stage-label" id="stageLabel"></span>
                </div>
              </div>
            </div>
          </div>
          <div class="chat-input-area">
            <div class="d-flex">
              <textarea id="messageInput" class="form-control me-2" placeholder="Type your response..." rows="1"></textarea>
              <button id="sendBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i></button>
            </div>
          </div>
        </div>

        <!-- Resizer between chat and progress -->
        <div class="progress-resizer" id="progressResizer" title="Drag to resize"></div>

        <!-- Progress column -->
        <div class="progress-column" id="progressColumn">
          <div class="progress-header">
            <h6><i class="fas fa-chart-line"></i> Learning Progress</h6>
          </div>
          <div class="progress-content" id="progressContent">
            <div id="masteryList">
              <p class="text-muted" style="font-size:0.78rem;">Mastery progress appears here as you learn.</p>
            </div>
            <div id="misconceptionsList" style="display:none;" class="mt-2">
              <h6 class="mb-1" style="font-size:0.8rem;"><i class="fas fa-exclamation-triangle text-warning"></i> Misconceptions</h6>
              <div id="misconceptionsContainer"></div>
            </div>

            <div id="teachingPlanSection" style="display:none;">
              <div class="tp-header" id="tpToggleBtn">
                <h6><i class="fas fa-book-open text-primary"></i> Teaching Plan</h6>
                <i class="fas fa-chevron-down" id="tpChevron" style="font-size:0.7rem;color:#6c757d;"></i>
              </div>
              <div id="teachingPlanBody">
                <div id="teachingPlanContent"></div>
              </div>
            </div>

            <div id="toolActivitySection" style="display:none;">
              <div class="tp-header" id="toolActToggleBtn">
                <h6><i class="fas fa-terminal text-primary"></i> Tool Activity</h6>
                <i class="fas fa-chevron-down" id="toolActChevron" style="font-size:0.7rem;color:#6c757d;"></i>
              </div>
              <div id="toolActivityBody">
                <div id="toolActivityContent"></div>
              </div>
            </div>

            <div id="teachingContentSection" style="display:none;">
              <div class="tp-header" id="tcToggleBtn">
                <h6><i class="fas fa-file-lines text-primary"></i> Teaching Content</h6>
                <i class="fas fa-chevron-down" id="tcChevron" style="font-size:0.7rem;color:#6c757d;"></i>
              </div>
              <div id="teachingContentBody">
                <div id="teachingContentContent"></div>
              </div>
            </div>

            <div id="turnAnalysisSection" style="display:none;">
              <div class="tp-header" id="taToggleBtn">
                <h6><i class="fas fa-magnifying-glass text-primary"></i> Turn Analysis</h6>
                <i class="fas fa-chevron-down" id="taChevron" style="font-size:0.7rem;color:#6c757d;"></i>
              </div>
              <div id="turnAnalysisBody">
                <div id="turnAnalysisContent"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatMessages = document.getElementById("chatMessages");
      const typingIndicator = document.getElementById("typingIndicator");
      const stageLabel = document.getElementById("stageLabel");
      const wsStatus = document.getElementById("wsStatus");
      const currentStageDisplay = document.getElementById("currentStageDisplay");
      const currentObjectiveDisplay = document.getElementById("currentObjectiveDisplay");
      const assessmentBar = document.getElementById("assessmentBar");
      const assessmentScore = document.getElementById("assessmentScore");
      const assessmentBadge = document.getElementById("assessmentBadge");
      const assessmentInfo = document.getElementById("assessmentInfo");
      const masteryList = document.getElementById("masteryList");
      const studentListEl = document.getElementById("studentList");
      const newStudentBtn = document.getElementById("newStudentBtn");

      let isProcessing = false;
      let ws = null;
      let pingInterval = null;
      let streamingBubble = null;
      let streamingTextEl = null;
      let currentStage = "connecting";
      let masteryData = {};
      let teachingPlanData = null;
      let teachingContentData = null;
      let turnAnalysisData = [];
      let turnAnalysisGenerating = false;
      let toolActivityData = [];

      // ================================================================
      // MULTI-STUDENT STATE (localStorage)
      // ================================================================

      let students = JSON.parse(localStorage.getItem("guided_students") || "[]");
      let activeStudentId = localStorage.getItem("guided_active") || null;

      function saveStudents() {
        localStorage.setItem("guided_students", JSON.stringify(students));
        localStorage.setItem("guided_active", activeStudentId || "");
      }

      function getStudent(id) {
        return students.find(s => s.id === id) || null;
      }

      function updateStudentMeta(id, updates) {
        const s = getStudent(id);
        if (s) { Object.assign(s, updates); saveStudents(); renderStudentList(); }
      }

      // Save/restore chat HTML per student
      function saveChatHistory() {
        if (!activeStudentId) return;
        const els = [];
        chatMessages.querySelectorAll(".message-bubble, .onboarding-card, .text-center").forEach(el => els.push(el.outerHTML));
        localStorage.setItem(`chat_${activeStudentId}`, JSON.stringify(els));
        localStorage.setItem(`mastery_${activeStudentId}`, JSON.stringify(masteryData));
        saveTeachingSidebarState(activeStudentId);
      }

      function loadStoredJSON(key) {
        const raw = localStorage.getItem(key);
        if (raw === null) return null;
        try { return JSON.parse(raw); } catch (error) { return null; }
      }

      function saveTeachingSidebarState(studentId) {
        if (!studentId) return;
        localStorage.setItem(`teaching_plan_${studentId}`, JSON.stringify(teachingPlanData));
        localStorage.setItem(`teaching_content_${studentId}`, JSON.stringify(teachingContentData));
        localStorage.setItem(`turn_analysis_${studentId}`, JSON.stringify(turnAnalysisData));
        localStorage.setItem(`tool_activity_${studentId}`, JSON.stringify(toolActivityData));
      }

      function clearTeachingSidebar() {
        teachingPlanData = null;
        teachingContentData = null;
        turnAnalysisData = [];
        turnAnalysisGenerating = false;
        toolActivityData = [];
        resetTeachingPlanSection();
        resetTeachingContentSection();
        resetTurnAnalysisSection();
        resetToolActivitySection();
      }

      function loadTeachingSidebarState(studentId) {
        if (!studentId) { clearTeachingSidebar(); return; }
        const storedPlan = loadStoredJSON(`teaching_plan_${studentId}`);
        const storedContent = loadStoredJSON(`teaching_content_${studentId}`);
        const storedTurnAnalysis = loadStoredJSON(`turn_analysis_${studentId}`);
        const storedToolActivity = loadStoredJSON(`tool_activity_${studentId}`);
        if (storedPlan !== null) showTeachingPlan(storedPlan, false);
        else resetTeachingPlanSection();
        if (storedContent !== null) showTeachingContent(storedContent, false);
        else resetTeachingContentSection();
        if (storedTurnAnalysis !== null) loadTurnAnalysisHistory(storedTurnAnalysis);
        else resetTurnAnalysisSection();
        if (Array.isArray(storedToolActivity) && storedToolActivity.length) {
          loadToolActivity(storedToolActivity);
        } else {
          resetToolActivitySection();
        }
      }

      function loadChatHistory(id) {
        chatMessages.innerHTML = "";
        chatMessages.appendChild(typingIndicator);
        const saved = JSON.parse(localStorage.getItem(`chat_${id}`) || "[]");
        saved.forEach(html => {
          const wrapper = document.createElement("div");
          wrapper.innerHTML = html;
          if (wrapper.firstChild) chatMessages.insertBefore(wrapper.firstChild, typingIndicator);
        });
        masteryData = JSON.parse(localStorage.getItem(`mastery_${id}`) || "{}");
        renderMasteryList();
        loadTeachingSidebarState(id);
        scrollToBottomIfNeeded();
      }

      function createNewStudent() {
        saveChatHistory();
        const id = "guided-student-" + Math.random().toString(36).substring(2, 8);
        const num = students.length + 1;
        students.push({ id, label: `Student ${num}`, level: "", objective: "", stage: "onboarding" });
        activeStudentId = id;
        saveStudents();
        masteryData = {};
        chatMessages.innerHTML = "";
        chatMessages.appendChild(typingIndicator);
        renderMasteryList();
        clearTeachingSidebar();
        renderStudentList();
        disconnectWS();
        connectWebSocket();
      }

      function switchStudent(id) {
        if (id === activeStudentId) return;
        saveChatHistory();
        activeStudentId = id;
        saveStudents();
        loadChatHistory(id);
        renderStudentList();
        const s = getStudent(id);
        updateStageDisplay(s?.stage || "connecting", s?.objective || "");
        disconnectWS();
        connectWebSocket();
      }

      function resetStudent(id) {
        if (!confirm("Reset this student's session? Chat history will be cleared but their profile stays.")) return;
        // Clear frontend state
        localStorage.removeItem(`chat_${id}`);
        localStorage.removeItem(`mastery_${id}`);
        localStorage.removeItem(`teaching_plan_${id}`);
        localStorage.removeItem(`teaching_content_${id}`);
        localStorage.removeItem(`turn_analysis_${id}`);
        localStorage.removeItem(`tool_activity_${id}`);
        // Reset student meta
        const s = getStudent(id);
        if (s) { s.stage = "onboarding"; s.objective = ""; saveStudents(); }
        // Clear backend conversation memory by sending a reset message
        if (id === activeStudentId) {
          masteryData = {};
          chatMessages.innerHTML = "";
          chatMessages.appendChild(typingIndicator);
          renderMasteryList();
          clearTeachingSidebar();
          // Send reset to backend to clear conversation memory
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "reset_session" }));
          }
          disconnectWS();
          connectWebSocket();
        }
        renderStudentList();
      }

      function deleteStudent(id) {
        if (!confirm("Delete this student entirely?")) return;
        localStorage.removeItem(`chat_${id}`);
        localStorage.removeItem(`mastery_${id}`);
        localStorage.removeItem(`teaching_plan_${id}`);
        localStorage.removeItem(`teaching_content_${id}`);
        localStorage.removeItem(`turn_analysis_${id}`);
        localStorage.removeItem(`tool_activity_${id}`);
        students = students.filter(s => s.id !== id);
        saveStudents();
        if (id === activeStudentId) {
          if (students.length > 0) {
            switchStudent(students[0].id);
          } else {
            createNewStudent();
          }
        }
        renderStudentList();
      }

      function renderStudentList() {
        studentListEl.innerHTML = "";
        students.forEach(s => {
          const item = document.createElement("div");
          item.className = `student-item${s.id === activeStudentId ? " active" : ""}`;
          const levelClass = s.level || "none";
          const levelLabel = s.level ? s.level.replace("_", " ") : "New";
          const objShort = s.objective ? s.objective.substring(0, 30) + "..." : "Onboarding";

          const infoDiv = document.createElement("div");
          infoDiv.style.flex = "1";
          infoDiv.innerHTML = `
            <div class="student-label">${s.label}</div>
            <div class="student-meta">${objShort}</div>
            <span class="student-level ${levelClass}">${levelLabel}</span>
          `;
          infoDiv.addEventListener("click", () => switchStudent(s.id));

          const actionsDiv = document.createElement("div");
          actionsDiv.className = "student-actions";
          actionsDiv.innerHTML = `
            <button class="btn-icon" title="Reset session"><i class="fas fa-redo-alt"></i></button>
            <button class="btn-icon btn-icon-danger" title="Delete student"><i class="fas fa-trash"></i></button>
          `;
          actionsDiv.querySelector("button:first-child").addEventListener("click", (e) => { e.stopPropagation(); resetStudent(s.id); });
          actionsDiv.querySelector("button:last-child").addEventListener("click", (e) => { e.stopPropagation(); deleteStudent(s.id); });

          item.style.display = "flex";
          item.style.alignItems = "flex-start";
          item.style.gap = "0.3rem";
          item.appendChild(infoDiv);
          item.appendChild(actionsDiv);
          studentListEl.appendChild(item);
        });
      }

      newStudentBtn.addEventListener("click", createNewStudent);

      const STAGE_LABELS = {
        loading: "Loading your profile...",
        searching: "Searching knowledge base...",
        composing: "Composing response...",
        classifying: "Understanding your response...",
      };
      const STAGE_DISPLAY = {
        onboarding: "Onboarding", introduction: "Introduction", exploration: "Exploration",
        readiness_check: "Readiness Check", mini_assessment: "Mini Assessment",
        final_assessment: "Final Assessment", transition: "Transition",
      };

      // ================================================================
      // WEBSOCKET
      // ================================================================

      function disconnectWS() {
        if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
        if (ws) { ws.onclose = null; ws.close(); ws = null; }
      }

      function connectWebSocket() {
        if (!activeStudentId) return;
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${window.location.host}/chat/guided/ws`);

        ws.onopen = function () {
          wsStatus.textContent = "Connected";
          wsStatus.className = "ws-status connected";
          ws.send(JSON.stringify({ type: "auth", student_id: activeStudentId }));
          if (pingInterval) clearInterval(pingInterval);
          pingInterval = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
          }, 30000);
        };
        ws.onmessage = function (event) { handleServerMessage(JSON.parse(event.data)); };
        ws.onclose = function (event) {
          wsStatus.textContent = "Disconnected";
          wsStatus.className = "ws-status disconnected";
          if (pingInterval) clearInterval(pingInterval);
          if (event.code !== 1000) setTimeout(connectWebSocket, 3000);
        };
        ws.onerror = function (error) { console.error("WS error:", error); };
      }

      function handleServerMessage(msg) {
        switch (msg.type) {
          case "connected": break;
          case "authenticated":
            currentStage = msg.stage || "onboarding";
            updateStageDisplay(currentStage, msg.objective || "");
            updateStudentMeta(msg.student_id, { stage: currentStage, objective: msg.objective || "" });
            if (msg.has_profile) setProcessingState(false);
            break;
          case "welcome":
            addMessage("tutor", msg.content);
            setProcessingState(false);
            break;
          case "stage":
            stageLabel.textContent = msg.detail || STAGE_LABELS[msg.stage] || msg.stage;
            setProcessingState(true);
            break;
          case "rag_chunks": break;
          case "stream_start":
            typingIndicator.style.display = "none"; stageLabel.textContent = "";
            createStreamingBubble();
            break;
          case "token": appendToken(msg.content); break;
          case "stream_end": finalizeStreamingBubble(); setProcessingState(false); break;
          case "stage_update":
            currentStage = msg.stage;
            updateStageDisplay(msg.stage, msg.objective || "");
            updateStudentMeta(activeStudentId, { stage: msg.stage, objective: msg.objective || "" });
            if (msg.summary) addSystemNotice(`${STAGE_DISPLAY[msg.stage] || msg.stage} — ${msg.summary}`);
            break;
          case "mastery_update":
            updateMasteryCard(msg.objective_text || msg.objective_id, msg.new_level);
            break;
          case "assessment_score": updateAssessmentDisplay(msg); break;
          case "onboarding_question": renderOnboardingQuestion(msg); break;
          case "onboarding_complete":
            updateStageDisplay("introduction", msg.first_objective || "");
            updateStudentMeta(activeStudentId, {
              level: msg.profile?.a11y_exposure || "", objective: msg.first_objective || "", stage: "introduction"
            });
            addSystemNotice(`Profile created! Starting: ${msg.first_objective}`);
            setProcessingState(false);
            break;
          case "objective_complete":
            updateMasteryCard(msg.objective_id, msg.mastery_level);
            if (msg.next_objective) addSystemNotice(`Objective complete! Next: ${msg.next_objective}`);
            break;
          case "tool_call":
            if (msg.status === "calling") {
              stageLabel.textContent = `Using ${msg.tool.replace(/_/g, " ")}...`;
            } else if (msg.status === "completed") {
              stageLabel.textContent = "";
            } else if (msg.status === "denied") {
              addSystemNotice(`${msg.tool}: ${msg.summary || "denied"}`);
            }
            break;
          case "mastery_denied":
            addSystemNotice(`Mastery update deferred: ${msg.reason}`);
            break;
          case "teaching_plan_generating":
            showTeachingPlanGenerating();
            break;
          case "teaching_plan":
            showTeachingPlan(msg.display_plan || msg.plan);
            break;
          case "teaching_content_generating":
            showTeachingContentGenerating();
            break;
          case "teaching_content":
            showTeachingContent(msg.content);
            break;
          case "turn_analysis_generating":
            showTurnAnalysisGenerating();
            break;
          case "turn_analysis":
            showTurnAnalysis(msg.display_analysis || msg.analysis, msg.analysis);
            break;
          case "tool_activity":
            recordToolActivity(msg);
            break;
          case "session_reset":
            clearTeachingSidebar();
            break;
          case "error": setProcessingState(false); addMessage("system", "Error: " + msg.message); break;
          case "pong": break;
          default: console.log("WS: unknown", msg.type, msg);
        }
      }

      // ================================================================
      // STAGE & MASTERY
      // ================================================================

      function updateStageDisplay(stage, objective) {
        currentStageDisplay.textContent = STAGE_DISPLAY[stage] || stage;
        currentObjectiveDisplay.textContent = objective ? `— ${objective}` : "";
        if (stage === "mini_assessment" || stage === "final_assessment") {
          assessmentBar.style.display = "block"; assessmentInfo.style.display = "inline";
          assessmentBadge.textContent = stage === "mini_assessment" ? "Mini (3 Qs)" : "Final (5 Qs)";
        } else { assessmentBar.style.display = "none"; assessmentInfo.style.display = "none"; }
      }

      function updateAssessmentDisplay(data) {
        assessmentScore.textContent = `${data.correct}/${data.asked}`;
        if (data.passed === true) { assessmentBar.style.backgroundColor = "#d1e7dd"; assessmentBar.style.borderColor = "#198754"; }
        else if (data.passed === false) { assessmentBar.style.backgroundColor = "#f8d7da"; assessmentBar.style.borderColor = "#dc3545"; }
      }

      function updateMasteryCard(id, level) { masteryData[id] = level; renderMasteryList(); }

      function renderMasteryList() {
        const ids = Object.keys(masteryData);
        if (!ids.length) { masteryList.innerHTML = '<p class="text-muted" style="font-size:0.78rem;">Mastery progress appears here as you learn.</p>'; return; }
        masteryList.innerHTML = "";
        ids.forEach(id => {
          const level = masteryData[id];
          const card = document.createElement("div"); card.className = "mastery-card";
          card.innerHTML = `<div class="d-flex justify-content-between align-items-center"><span class="objective-text">${id}</span><span class="mastery-level ${level}">${level.replace("_"," ")}</span></div>`;
          masteryList.appendChild(card);
        });
      }

      function addSystemNotice(text) {
        const el = document.createElement("div"); el.className = "text-center my-2";
        el.innerHTML = `<small class="text-muted"><i class="fas fa-info-circle"></i> ${formatInlineMessage(text)}</small>`;
        chatMessages.insertBefore(el, typingIndicator); scrollToBottomIfNeeded();
      }

      // ================================================================
      // TEACHING PLAN
      // ================================================================

      let tpCollapsed = false;
      let tcCollapsed = false;
      let taCollapsed = false;
      let toolActCollapsed = false;

      document.getElementById("tpToggleBtn").addEventListener("click", function () {
        tpCollapsed = !tpCollapsed;
        document.getElementById("teachingPlanBody").style.display = tpCollapsed ? "none" : "block";
        const ch = document.getElementById("tpChevron");
        ch.className = tpCollapsed ? "fas fa-chevron-right" : "fas fa-chevron-down";
      });

      document.getElementById("tcToggleBtn").addEventListener("click", function () {
        tcCollapsed = !tcCollapsed;
        document.getElementById("teachingContentBody").style.display = tcCollapsed ? "none" : "block";
        const ch = document.getElementById("tcChevron");
        ch.className = tcCollapsed ? "fas fa-chevron-right" : "fas fa-chevron-down";
      });

      document.getElementById("taToggleBtn").addEventListener("click", function () {
        taCollapsed = !taCollapsed;
        document.getElementById("turnAnalysisBody").style.display = taCollapsed ? "none" : "block";
        const ch = document.getElementById("taChevron");
        ch.className = taCollapsed ? "fas fa-chevron-right" : "fas fa-chevron-down";
      });

      document.getElementById("toolActToggleBtn").addEventListener("click", function () {
        toolActCollapsed = !toolActCollapsed;
        document.getElementById("toolActivityBody").style.display = toolActCollapsed ? "none" : "block";
        const ch = document.getElementById("toolActChevron");
        ch.className = toolActCollapsed ? "fas fa-chevron-right" : "fas fa-chevron-down";
      });

      function renderTeachingPanelValue(value) {
        if (value === null || value === undefined || value === "") {
          return '<div class="tp-text"></div>';
        }
        if (typeof value === "string") {
          return `<div class="tp-text tp-md">${marked.parse(value)}</div>`;
        }
        const json = JSON.stringify(value, null, 2);
        const pre = document.createElement("pre");
        pre.className = "tp-json";
        pre.textContent = json;
        return `<div class="tp-text">${pre.outerHTML}</div>`;
      }

      function expandTeachingPanel(sectionId, bodyId, chevronId) {
        document.getElementById(sectionId).style.display = "block";
        document.getElementById(bodyId).style.display = "block";
        document.getElementById(chevronId).className = "fas fa-chevron-down";
      }

      function resetTeachingPlanSection() {
        tpCollapsed = false;
        document.getElementById("teachingPlanSection").style.display = "none";
        document.getElementById("teachingPlanBody").style.display = "block";
        document.getElementById("tpChevron").className = "fas fa-chevron-down";
        document.getElementById("teachingPlanContent").innerHTML = "";
      }

      function resetTeachingContentSection() {
        tcCollapsed = false;
        document.getElementById("teachingContentSection").style.display = "none";
        document.getElementById("teachingContentBody").style.display = "block";
        document.getElementById("tcChevron").className = "fas fa-chevron-down";
        document.getElementById("teachingContentContent").innerHTML = "";
      }

      function resetTurnAnalysisSection() {
        taCollapsed = false;
        document.getElementById("turnAnalysisSection").style.display = "none";
        document.getElementById("turnAnalysisBody").style.display = "block";
        document.getElementById("taChevron").className = "fas fa-chevron-down";
        document.getElementById("turnAnalysisContent").innerHTML = "";
      }

      function renderTurnAnalysisHistory(entries, generating = false) {
        const history = Array.isArray(entries) ? entries : [];
        const parts = [];
        if (generating) {
          parts.push('<div class="tp-generating"><i class="fas fa-spinner fa-spin me-1"></i> Turn analysis is being generated for the latest student response.</div>');
        }
        if (!history.length) {
          return parts.join("");
        }

        const renderedEntries = history.map((entry, index) => {
          const label = entry?.label || `Turn ${index + 1}`;
          const body = renderTeachingPanelValue(
            Object.prototype.hasOwnProperty.call(entry || {}, "display")
              ? entry.display
              : entry?.analysis
          );
          return `<div class="turn-analysis-entry"><div class="turn-analysis-entry-title">${label}</div>${body}</div>`;
        });
        parts.push(`<div class="turn-analysis-history">${renderedEntries.join("")}</div>`);
        return parts.join("");
      }

      function normalizeTurnAnalysisHistory(value) {
        if (Array.isArray(value)) {
          return value.map((entry, index) => ({
            label: entry?.label || `Turn ${index + 1}`,
            display: Object.prototype.hasOwnProperty.call(entry || {}, "display")
              ? entry.display
              : (
                  typeof entry?.analysis === "string"
                    ? entry.analysis
                    : (Object.prototype.hasOwnProperty.call(entry || {}, "analysis") ? null : (typeof entry === "string" ? entry : null))
                ),
            analysis: Object.prototype.hasOwnProperty.call(entry || {}, "analysis") ? entry.analysis : entry,
          }));
        }
        if (value === null || value === undefined) return [];
        return [{
          label: "Turn 1",
          display: typeof value === "string" ? value : null,
          analysis: value,
        }];
      }

      function showTeachingPlanGenerating() {
        expandTeachingPanel("teachingPlanSection", "teachingPlanBody", "tpChevron");
        document.getElementById("teachingPlanContent").innerHTML =
          '<div class="tp-generating"><i class="fas fa-spinner fa-spin me-1"></i> Teaching plan is being generated, you will see it once it is done. Thank you for waiting.</div>';
      }

      function showTeachingPlan(plan, persist = true) {
        teachingPlanData = plan;
        expandTeachingPanel("teachingPlanSection", "teachingPlanBody", "tpChevron");
        document.getElementById("teachingPlanContent").innerHTML = renderTeachingPanelValue(plan);
        if (persist) saveTeachingSidebarState(activeStudentId);
      }

      function showTeachingContentGenerating() {
        expandTeachingPanel("teachingContentSection", "teachingContentBody", "tcChevron");
        document.getElementById("teachingContentContent").innerHTML =
          '<div class="tp-generating"><i class="fas fa-spinner fa-spin me-1"></i> Teaching content is being assembled from the evidence pack.</div>';
      }

      function showTeachingContent(content, persist = true) {
        teachingContentData = content;
        expandTeachingPanel("teachingContentSection", "teachingContentBody", "tcChevron");
        document.getElementById("teachingContentContent").innerHTML = renderTeachingPanelValue(content);
        if (persist) saveTeachingSidebarState(activeStudentId);
      }

      function showTurnAnalysisGenerating() {
        turnAnalysisGenerating = true;
        expandTeachingPanel("turnAnalysisSection", "turnAnalysisBody", "taChevron");
        document.getElementById("turnAnalysisContent").innerHTML = renderTurnAnalysisHistory(turnAnalysisData, true);
      }

      function loadTurnAnalysisHistory(history) {
        turnAnalysisGenerating = false;
        turnAnalysisData = normalizeTurnAnalysisHistory(history);
        if (!turnAnalysisData.length) {
          resetTurnAnalysisSection();
          return;
        }
        expandTeachingPanel("turnAnalysisSection", "turnAnalysisBody", "taChevron");
        document.getElementById("turnAnalysisContent").innerHTML = renderTurnAnalysisHistory(turnAnalysisData, false);
      }

      // ================================================================
      // TOOL ACTIVITY
      // ================================================================

      const TOOL_ACTIVITY_PHASE_LABELS = {
        retrieval: "Teaching content retrieval",
      };

      function resetToolActivitySection() {
        toolActCollapsed = false;
        document.getElementById("toolActivitySection").style.display = "none";
        document.getElementById("toolActivityBody").style.display = "block";
        document.getElementById("toolActChevron").className = "fas fa-chevron-down";
        document.getElementById("toolActivityContent").innerHTML = "";
      }

      function statusToCardClass(entry) {
        if (entry.status !== "completed") return "ta-pending";
        const rs = (entry.result_status || "").toUpperCase();
        if (rs === "HIT") return "ta-hit";
        if (rs === "MISS") return "ta-miss";
        if (rs === "BLOCKED") return "ta-blocked";
        if (rs === "ERROR") return "ta-error";
        return "ta-hit";
      }

      function statusToResultClass(entry) {
        const rs = (entry.result_status || "").toUpperCase();
        if (rs === "ERROR") return "ta-result-error";
        if (rs === "BLOCKED") return "ta-result-blocked";
        if (rs === "MISS") return "ta-result-miss";
        return "";
      }

      function renderToolActivityCard(entry) {
        const cardClass = statusToCardClass(entry);
        const resultClass = statusToResultClass(entry);
        const phaseLabel = TOOL_ACTIVITY_PHASE_LABELS[entry.phase] || entry.phase || "tool";
        const round = entry.round ? `round ${entry.round}` : "";
        const seq = entry.sequence ? `#${entry.sequence}` : "";
        const meta = [phaseLabel, round, seq].filter(Boolean).join(" · ");
        const params = entry.params && Object.keys(entry.params).length
          ? `<details class="ta-params"><summary></summary><pre>${escapeHtml(JSON.stringify(entry.params, null, 2))}</pre></details>`
          : "";
        const description = entry.description
          ? `<div class="ta-row"><span class="ta-row-label">what:</span><span class="ta-row-text">${escapeHtml(entry.description)}</span></div>`
          : "";
        const rationale = entry.rationale
          ? `<div class="ta-row"><span class="ta-row-label">why:</span><span class="ta-row-text">${escapeHtml(entry.rationale)}</span></div>`
          : `<div class="ta-row"><span class="ta-row-label">why:</span><span class="ta-row-text" style="color:#adb5bd;">(no rationale provided)</span></div>`;
        const result = entry.status === "completed" && entry.result_summary
          ? `<div class="ta-result ${resultClass}">→ ${escapeHtml(entry.result_summary)}</div>`
          : (entry.status !== "completed"
              ? `<div class="ta-result"><i class="fas fa-spinner fa-spin"></i> calling…</div>`
              : "");
        return `
          <div class="ta-card ${cardClass}">
            <div class="ta-card-header">
              <span class="ta-tool-name">${escapeHtml(entry.name || "(unknown)")}</span>
              <span class="ta-meta">${escapeHtml(meta)}</span>
            </div>
            ${description}
            ${rationale}
            ${params}
            ${result}
          </div>
        `;
      }

      function renderToolActivityList() {
        const groups = {};
        toolActivityData.forEach(entry => {
          const phase = entry.phase || "other";
          (groups[phase] = groups[phase] || []).push(entry);
        });
        const phaseOrder = Object.keys(groups);
        const html = phaseOrder.map(phase => {
          const label = TOOL_ACTIVITY_PHASE_LABELS[phase] || phase;
          const cards = groups[phase].map(renderToolActivityCard).join("");
          return `<div class="ta-phase-label">${escapeHtml(label)}</div><div class="ta-list">${cards}</div>`;
        }).join("");
        document.getElementById("toolActivityContent").innerHTML = html;
      }

      function showToolActivitySection() {
        document.getElementById("toolActivitySection").style.display = "block";
        document.getElementById("toolActivityBody").style.display = toolActCollapsed ? "none" : "block";
      }

      function activityKey(entry) {
        return `${entry.phase || ""}::${entry.name || ""}::${entry.round || ""}::${entry.sequence || ""}::${JSON.stringify(entry.params || {})}`;
      }

      function recordToolActivity(msg) {
        const incoming = {
          phase: msg.phase || "retrieval",
          round: msg.round || null,
          sequence: msg.sequence || null,
          name: msg.name || "",
          params: msg.params || {},
          description: msg.description || "",
          rationale: msg.rationale || "",
          status: msg.status || "calling",
          result_status: msg.result_status || "",
          result_summary: msg.result_summary || "",
        };
        const key = activityKey(incoming);
        const existingIdx = toolActivityData.findIndex(e => activityKey(e) === key);
        if (existingIdx >= 0) {
          toolActivityData[existingIdx] = { ...toolActivityData[existingIdx], ...incoming };
        } else {
          toolActivityData.push(incoming);
        }
        showToolActivitySection();
        renderToolActivityList();
        saveTeachingSidebarState(activeStudentId);
      }

      function loadToolActivity(history) {
        toolActivityData = Array.isArray(history) ? history : [];
        if (!toolActivityData.length) { resetToolActivitySection(); return; }
        showToolActivitySection();
        renderToolActivityList();
      }

      function showTurnAnalysis(displayAnalysis, rawAnalysis = null, persist = true) {
        turnAnalysisGenerating = false;
        const history = normalizeTurnAnalysisHistory(turnAnalysisData);
        const nextTurnNumber = history.length + 1;
        turnAnalysisData = [...history, {
          label: `Turn ${nextTurnNumber}`,
          display: displayAnalysis,
          analysis: rawAnalysis !== null ? rawAnalysis : displayAnalysis,
        }];
        expandTeachingPanel("turnAnalysisSection", "turnAnalysisBody", "taChevron");
        document.getElementById("turnAnalysisContent").innerHTML = renderTurnAnalysisHistory(turnAnalysisData, false);
        if (persist) saveTeachingSidebarState(activeStudentId);
      }

      // ================================================================
      // STREAMING
      // ================================================================

      function isNearBottom() { return chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 100; }
      function scrollToBottomIfNeeded() { if (isNearBottom()) chatMessages.scrollTop = chatMessages.scrollHeight; }

      function createStreamingBubble() {
        const bubble = document.createElement("div"); bubble.className = "message-bubble tutor";
        const av = document.createElement("div"); av.className = "avatar avatar-tutor"; av.innerHTML = '<i class="fas fa-robot"></i>';
        const mc = document.createElement("div"); mc.className = "message-content";
        const te = document.createElement("div"); te.className = "streaming-text";
        mc.appendChild(te); bubble.appendChild(av); bubble.appendChild(mc);
        chatMessages.insertBefore(bubble, typingIndicator);
        streamingBubble = bubble; streamingTextEl = te; scrollToBottomIfNeeded();
      }

      let _mt = null;
      function appendToken(token) {
        if (!streamingTextEl) return;
        streamingTextEl._rawText = (streamingTextEl._rawText || "") + token;
        if (!_mt) { _mt = setTimeout(() => { _mt = null; if (streamingTextEl) { streamingTextEl.innerHTML = formatMessage(streamingTextEl._rawText); scrollToBottomIfNeeded(); } }, 120); }
      }

      function finalizeStreamingBubble() {
        if (_mt) { clearTimeout(_mt); _mt = null; }
        if (streamingBubble && streamingTextEl) {
          let text = streamingTextEl._rawText || "";
          text = text.replace(/```json[\s\S]*?```/g, "").trim();
          streamingTextEl.innerHTML = formatMessage(text);
          const ts = document.createElement("div"); ts.className = "message-timestamp";
          ts.textContent = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
          streamingTextEl.parentElement.appendChild(ts);
        }
        streamingBubble = null; streamingTextEl = null;
      }

      // ================================================================
      // USER ACTIONS
      // ================================================================

      sendBtn.addEventListener("click", () => {
        const message = messageInput.value.trim();
        if (message && !isProcessing) {
          addMessage("user", message); setProcessingState(true);
          if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "message", content: message }));
          messageInput.value = ""; autoResizeTextarea(messageInput);
        }
      });
      messageInput.addEventListener("keypress", function (e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });
      messageInput.addEventListener("input", () => autoResizeTextarea(messageInput));

      // ================================================================
      // UI HELPERS
      // ================================================================

      function addMessage(type, content) {
        const bubble = document.createElement("div"); bubble.className = `message-bubble ${type}`;
        const av = document.createElement("div"); av.className = `avatar avatar-${type}`;
        av.innerHTML = `<i class="fas ${type === "user" ? "fa-user" : "fa-robot"}"></i>`;
        const mc = document.createElement("div"); mc.className = "message-content";
        const te = document.createElement("div"); te.innerHTML = formatMessage(content);
        const ts = document.createElement("div"); ts.className = "message-timestamp";
        ts.textContent = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
        mc.appendChild(te); mc.appendChild(ts); bubble.appendChild(av); bubble.appendChild(mc);
        chatMessages.insertBefore(bubble, typingIndicator); scrollToBottomIfNeeded();
      }

      function setProcessingState(processing) {
        isProcessing = processing; sendBtn.disabled = processing; messageInput.disabled = processing;
        typingIndicator.style.display = processing ? "flex" : "none";
        if (processing) { sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; scrollToBottomIfNeeded(); }
        else { sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>'; stageLabel.textContent = ""; messageInput.focus(); }
      }

      function autoResizeTextarea(ta) { ta.style.height = "auto"; ta.style.height = `${Math.min(ta.scrollHeight, 160)}px`; }

      function escapeHtml(text) {
        if (typeof text !== "string") return "";
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      marked.setOptions({
        highlight: function(code, lang) { if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value; return hljs.highlightAuto(code).value; },
        breaks: true, gfm: true,
      });
      function formatMessage(content) {
        if (typeof content !== "string") return "";
        return marked.parse(content);
      }

      function formatInlineMessage(content) {
        if (typeof content !== "string") return "";
        return marked.parseInline(content);
      }

      // ================================================================
      // ONBOARDING FORM
      // ================================================================

      function renderOnboardingQuestion(msg) {
        setProcessingState(false);
        const card = document.createElement("div"); card.className = "onboarding-card";
        const step = document.createElement("div"); step.className = "step-badge"; step.textContent = `Step ${msg.step} of ${msg.total_steps}`; card.appendChild(step);
        const q = document.createElement("div"); q.className = "question-text"; q.textContent = msg.question; card.appendChild(q);
        if (msg.description) { const desc = document.createElement("div"); desc.className = "question-desc"; desc.textContent = msg.description; card.appendChild(desc); }
        const optionsDiv = document.createElement("div"); optionsDiv.className = "onboarding-options"; let selectedValue = null;
        (msg.options || []).forEach(opt => {
          const optEl = document.createElement("div"); optEl.className = "onboarding-option"; optEl.dataset.value = opt.value;
          let html = `<div><div class="opt-label">${opt.label}</div>`; if (opt.description) html += `<div class="opt-desc">${opt.description}</div>`; html += `</div>`; optEl.innerHTML = html;
          optEl.addEventListener("click", () => { optionsDiv.querySelectorAll(".onboarding-option").forEach(o => o.classList.remove("selected")); optEl.classList.add("selected"); selectedValue = opt.value; otherDiv.classList.remove("visible"); otherInput.value = ""; submitBtn.disabled = false; });
          optionsDiv.appendChild(optEl);
        });
        card.appendChild(optionsDiv);
        const otherDiv = document.createElement("div"); otherDiv.className = "onboarding-other";
        const otherInput = document.createElement("input"); otherInput.type = "text"; otherInput.className = "form-control form-control-sm"; otherInput.placeholder = "Type your answer...";
        otherInput.addEventListener("input", () => { if (otherInput.value.trim()) { selectedValue = otherInput.value.trim(); submitBtn.disabled = false; } });
        otherDiv.appendChild(otherInput); card.appendChild(otherDiv);
        if (msg.allow_other) {
          const otherBtn = document.createElement("div"); otherBtn.className = "onboarding-option";
          otherBtn.innerHTML = `<div><div class="opt-label">Other</div><div class="opt-desc">Type your own answer</div></div>`;
          otherBtn.addEventListener("click", () => { optionsDiv.querySelectorAll(".onboarding-option").forEach(o => o.classList.remove("selected")); otherBtn.classList.add("selected"); selectedValue = null; otherDiv.classList.add("visible"); otherInput.focus(); submitBtn.disabled = true; });
          optionsDiv.appendChild(otherBtn);
        }
        const submitBtn = document.createElement("button"); submitBtn.className = "btn btn-primary onboarding-submit";
        submitBtn.textContent = msg.step < msg.total_steps ? "Continue" : "Start Learning"; submitBtn.disabled = true;
        submitBtn.addEventListener("click", () => {
          if (!selectedValue) return;
          addMessage("user", selectedValue); card.style.opacity = "0.6"; card.style.pointerEvents = "none"; setProcessingState(true);
          if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "message", content: selectedValue }));
        });
        card.appendChild(submitBtn);
        chatMessages.insertBefore(card, typingIndicator); scrollToBottomIfNeeded();
      }

      // ================================================================
      // INIT
      // ================================================================

      // ================================================================
      // PROGRESS COLUMN RESIZE
      // ================================================================
      (function setupProgressResizer() {
        const resizer = document.getElementById("progressResizer");
        const column = document.getElementById("progressColumn");
        if (!resizer || !column) return;

        const STORAGE_KEY = "guided_progress_width";
        const MIN_W = 220;
        const getMaxW = () => Math.max(MIN_W, Math.round(window.innerWidth * 0.7));

        const saved = parseInt(localStorage.getItem(STORAGE_KEY), 10);
        if (Number.isFinite(saved)) {
          column.style.width = `${Math.min(Math.max(saved, MIN_W), getMaxW())}px`;
        }

        let dragging = false;
        let startX = 0;
        let startWidth = 0;

        resizer.addEventListener("mousedown", (e) => {
          dragging = true;
          startX = e.clientX;
          startWidth = column.getBoundingClientRect().width;
          resizer.classList.add("dragging");
          document.body.classList.add("resizing-progress");
          e.preventDefault();
        });

        window.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          const delta = startX - e.clientX;
          let newWidth = startWidth + delta;
          newWidth = Math.max(MIN_W, Math.min(newWidth, getMaxW()));
          column.style.width = `${newWidth}px`;
        });

        window.addEventListener("mouseup", () => {
          if (!dragging) return;
          dragging = false;
          resizer.classList.remove("dragging");
          document.body.classList.remove("resizing-progress");
          const finalW = Math.round(column.getBoundingClientRect().width);
          localStorage.setItem(STORAGE_KEY, String(finalW));
        });

        // Double-click to reset to default
        resizer.addEventListener("dblclick", () => {
          column.style.width = "280px";
          localStorage.setItem(STORAGE_KEY, "280");
        });

        // Re-clamp on viewport shrink
        window.addEventListener("resize", () => {
          const max = getMaxW();
          const cur = column.getBoundingClientRect().width;
          if (cur > max) column.style.width = `${max}px`;
        });
      })();

      // Save chat on page unload
      window.addEventListener("beforeunload", () => saveChatHistory());

      if (students.length === 0) {
        createNewStudent();
      } else {
        if (!activeStudentId || !getStudent(activeStudentId)) activeStudentId = students[0].id;
        loadChatHistory(activeStudentId);
        renderStudentList();
        setProcessingState(true);
        connectWebSocket();
      }
    });
  </script>
